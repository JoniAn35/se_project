<div class="d-flex flex-row w-auto">
  <button class="btn btn-primary mr-1" (click)="showAllHorses()" aria-label="Show all horses">
    <i class="bi bi-list"></i>
    Show All
  </button>
  <button class="btn btn-warning mr-1" (click)="clearSearch()" aria-label="Clear search">
    <i class="bi bi-x-circle"></i>
    Clear
  </button>
  <span style="flex: 1"></span>
  <a class="btn btn-secondary" routerLink="create" aria-label="New horse">
    <i class="bi bi-plus-lg"></i>
    New horse
  </a>
</div>

<form class="d-flex flex-row w-auto mb-3" (ngSubmit)="searchHorses()">
  <div class="flex-grow-2">
    <label for="searchHorseName" class="col-form-label">Name</label>
    <input
            type="text"
            id="searchHorseName"
            name="searchHorseName"
            [(ngModel)]="searchHorseName"
            class="form-control">
  </div>

  <div class="flex-grow-1 ms-1">
    <label for="searchHorseDescription" class="col-form-label">Description</label>
    <input
            type="text"
            id="searchHorseDescription"
            name="searchHorseDescription"
            [(ngModel)]="searchHorseDescription"
            class="form-control">
  </div>

  <div class="ms-1">
    <label for="searchHorseDateOfBirth" class="col-form-label">Born at or before</label>
    <input
            type="date"
            id="searchHorseDateOfBirth"
            name="searchHorseDateOfBirth"
            [(ngModel)]="searchHorseDateOfBirth"
            pattern="\d{4}-\d{2}-\d{2}"
            placeholder="yyyy-mm-dd"
            class="form-control">
  </div>

  <div class="ms-1">
    <label for="searchHorseSex" class="col-form-label">Sex</label>
    <select
            id="searchHorseSex"
            name="searchHorseSex"
            [(ngModel)]="searchHorseSex"
            class="form-select">
      <option></option>
      <option value="FEMALE">Female</option>
      <option value="MALE">Male</option>
    </select>
  </div>

  <div class="flex-grow-2 ms-1">
    <label for="searchHorseOwner" class="col-form-label">Owner</label>
    <app-autocomplete
            id="searchHorseOwner"
            name="searchHorseOwner"
            textInputClass="form-control"
            valueNeedsToMatchSuggestion="false"
            (valueChanged)="onOwnerSelect($event)">
    </app-autocomplete>
  </div>

  <div class="ms-1 d-flex align-items-end gap-2">
    <button type="submit" class="btn btn-primary" aria-label="Search horses">
      <i class="bi bi-search"></i> Search
    </button>
  </div>
</form>

<div class="mt-3">
  <table class="table table-hover">
    <thead>
    <th>Name</th>
    <th>Description</th>
    <th>Date of Birth</th>
    <th>Sex</th>
    <th>Owner</th>
    <th class="min-width">Actions</th>
    </thead>
    <tbody>
    @for (horse of horses; track horse.id) {
    <tr class="center-td">
      <td>{{ horse.name }}</td>
      <td>{{ horse.description }}</td>
      <td>{{ dateOfBirthAsLocaleDate(horse) }}</td>
      <td>{{ horse.sex === 'FEMALE' ? 'Female' : 'Male' }}</td>
      <td>{{ ownerName(horse.owner) }}</td>
      <td>
        <div class="btn-group">
          <a
                  [routerLink]="['/horses', horse.id, 'details']"
                  class="btn btn-sm responsive-info-button"
                  aria-label="Show horse details">
            <i class="bi bi-info-lg"></i>
          </a>

          <a
                  [routerLink]="['/horses', horse.id, 'edit']"
                  class="btn btn-sm btn-info"
                  aria-label="Edit horse">
            <i class="bi bi-pencil"></i> Edit
          </a>

          <button class="btn btn-sm responsive-danger-button" (click)="horseForDeletion = horse"
                  data-bs-toggle="modal" data-bs-target="#delete-dialog" aria-label="Delete horse">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </td>
    </tr>
    }
    </tbody>
  </table>
</div>

<app-confirm-delete-dialog
        id="delete-dialog"
        [hidden]="!horseForDeletion"
        [deleteWhat]="horseForDeletion?.name"
        (confirm)="deleteHorse(horseForDeletion)">
</app-confirm-delete-dialog>
